<script>
  // 1. 雪の演出
  (function() {
    const box = document.getElementById('snowContainer');
    if(!box) return;
    const icons = ['❄','❅','❆','✦','✧'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span');
      el.classList.add('snowflake');
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
      el.style.animationDuration = (10 + Math.random() * 18) + 's';
      el.style.opacity = 0;
      box.appendChild(el);
    }
  })();

  // 2. GAS連携のURL
  const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

  // --- 関数A：記事本文を読み込む ---
  async function loadDiary() {
    console.log("★loadDiary開始");
    const p = new URLSearchParams(window.location.search);
    const id = p.get('id');
    if (!id) return;

    try {
      const res = await fetch(MY_GAS_URL);
      const allRows = await res.json();
      const d = allRows.find(item => String(item.id) === String(id));
      window.diaryData = rows;
      
      if (!d) {
        document.getElementById('post-title').innerText = "記事が見つかりません";
        return;
      }

      document.title = d.title + " — ❄ ゲームひとひら綴り ❄";
      document.getElementById('post-title').innerText = d.title;
      document.getElementById('post-date').innerText = d.date;
      document.getElementById('breadcrumb-title').innerText = d.title;
      document.getElementById('post-tag-display').innerText = "#" + d.category;
      
      const body = document.getElementById('list-content');
      if (body) body.innerHTML = String(d.body).replace(/\n/g, '<br>');
      console.log("★本文の表示完了！");
    } catch (e) { console.error(e); }
  }

  // --- 関数B：カテゴリー一覧を読み込む ---
  async function loadCategoryList() {
    console.log("★カテゴリー一覧の作成開始");
    const container = document.getElementById('dynamic-tags'); 
    if (!container) return;

    try {
      const res = await fetch(MY_GAS_URL);
      const allData = await res.json();
      const categories = [...new Set(allData.map(item => item.category))];
      
      let html = '';
      categories.forEach(cat => {
          html += `<a href="list.html?tag=${encodeURIComponent(cat)}" class="tag-item" style="text-decoration:none; background:rgba(255,255,255,0.5); padding:5px 12px; border-radius:15px; font-size:0.85rem; color:#3378C1; border:1px solid #88ceeb;">#${cat}</a>`;
      });
      container.innerHTML = html;
      console.log("★カテゴリーの表示完了！");
    } catch (e) { console.error(e); }
  }

  // 3. ページが開いたら「本文」と「カテゴリー」を順番に実行！
  // ページが読み込まれた時の処理
  window.addEventListener('load', async () => {
      // 1. まずはメインの日記リスト（または本文）を読み込む
      // await をつけることで「読み込みが終わるまで次に行かないで」と命令するよ
      if (typeof updateList === 'function') {
          await updateList(); 
      } else if (typeof loadDiary === 'function') {
          await loadDiary();
          await loadCategoryList();
      }
      
      // 2. メインの読み込みが「完全に終わった後」に、新着日記を表示する
      if (typeof renderRecentPosts === 'function') {
          renderRecentPosts();
      }
  });

  // ブラウザの戻る・進むボタン用
  window.addEventListener('popstate', () => {
      if (typeof updateList === 'function') updateList();
  });
</script>
