<script>
const container = document.getElementById('snowContainer');
const symbols = ['❄','❅','❆','✦','✧'];
const count = 22;
for (let i = 0; i < count; i++) {
  const el = document.createElement('span');
  el.classList.add('snowflake');
  el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
  el.style.animationDuration = (10 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * 15) + 's';
  el.style.opacity = 0;
  container.appendChild(el);
}
</script>

<script src="js/diary-data.js?v=2" defer></script>
<script src="js/diary-contents.js?v=2" defer></script>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const currentId = params.get('id') || "20260407";

            // --- 1. 本文を表示 ---
            if (typeof diaryContents !== 'undefined') {
                const content = diaryContents[currentId];
                const contentEl = document.getElementById('list-content');
                if (contentEl && content) {
                    contentEl.innerHTML = (typeof content === 'string') ? content : (content.content || String(content));
                }
            }

            // --- 2. データの反映 ---
            if (typeof diaryData !== 'undefined') {
                const d = diaryData.find(item => String(item.id) === String(currentId));
                
                if (d) {
                    if (document.getElementById('post-title')) document.getElementById('post-title').innerText = d.title;
                    if (document.getElementById('post-date')) document.getElementById('post-date').innerText = d.date;
                    if (document.getElementById('breadcrumb-title')) document.getElementById('breadcrumb-title').innerText = d.title;
                    if (document.getElementById('post-tag-display')) document.getElementById('post-tag-display').innerText = "#" + d.category;
                    
                    // ★ここ！HTMLに最初からある「related-tag-text」の文字だけを変えるよ
                    const relText = document.getElementById('related-tag-text');
                    if (relText) {
                        relText.innerText = "❄ " + d.category + "日記一覧へ";
                    }
                    // カテゴリ一覧ボタンに「?tag=カテゴリ名」をくっつけるよ
                    const relBtn = document.getElementById('ICHIRAN_BTN');
                    if (relBtn) {
                        relBtn.href = `list.html?tag=${encodeURIComponent(d.category)}`;
                    }
                }

               // --- 3. 前後ボタンの設定（新しい順に合わせたよ！） ---
                const idx = diaryData.findIndex(item => String(item.id) === String(currentId));
                const btnP = document.getElementById('MAE');
                const btnN = document.getElementById('TSUGI');

                if (btnP && btnN) {
                    const safeIdx = (idx === -1) ? 0 : idx;

                    // 【前へ（過去へ）】 indexを増やす（リストの下へ行く）
                    if (safeIdx < diaryData.length - 1) {
                        const prev = diaryData[safeIdx + 1];
                        btnP.href = `post.html?id=${prev.id}`;
                        if (document.getElementById('MAE_T')) document.getElementById('MAE_T').innerText = prev.title;
                        btnP.style.visibility = 'visible';
                    } else {
                        btnP.style.visibility = 'hidden'; // 一番古い記事なら「前へ」を隠す
                    }

                    // 【次へ（最新へ）】 indexを減らす（リストの上へ戻る）
                    if (safeIdx > 0) {
                        const next = diaryData[safeIdx - 1];
                        btnN.href = `post.html?id=${next.id}`;
                        if (document.getElementById('TSUGI_T')) document.getElementById('TSUGI_T').innerText = next.title;
                        btnN.style.visibility = 'visible';
                    } else {
                        btnN.style.visibility = 'hidden'; // 最新の記事なら「次へ」を隠す
                    }
                }
            }
        }, 300);
    });
</script>
