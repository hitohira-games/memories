<script>
  // 1. 雪の演出
  (function() {
    const box = document.getElementById('snowContainer');
    if(!box) return;
    const icons = ['❄','❅','❆','✦','✧'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('span');
      el.classList.add('snowflake');
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
      el.style.animationDuration = (10 + Math.random() * 18) + 's';
      box.appendChild(el);
    }
  })();

  const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

  // --- 関数A：記事本文と「記事自体のタグ」をバラバラにする ---
  async function loadDiary() {
    const p = new URLSearchParams(window.location.search);
    const id = p.get('id');
    if (!id) return;

    try {
      const res = await fetch(MY_GAS_URL);
      const allRows = await res.json();
      const d = allRows.find(item => String(item.id) === String(id));
      window.diaryData = allRows; 
      
      if (!d) {
        document.getElementById('post-title').innerText = "記事が見つかりません";
        return;
      }

      document.title = d.title + " — ❄ ゲームひとひら綴り ❄";
      document.getElementById('post-title').innerText = d.title;
      document.getElementById('breadcrumb-title').innerText = d.title;

      // 日付
      const dateObj = new Date(d.date);
      document.getElementById('post-date').innerText = dateObj.toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replaceAll('/', '.');

      // 本文
      document.getElementById('list-content').innerHTML = String(d.body).replace(/\n/g, '<br>');

      // ★【ここが修正！】記事のタグをバラバラにする
      const tagDisplay = document.getElementById('post-tag-display');
      const rawCategory = d.category || "";
      const tagArray = rawCategory.split(',').map(t => t.replace('#', '').trim()).filter(t => t !== "");
      tagDisplay.innerHTML = tagArray.map(t => `<span class="tag-item">#${t}</span>`).join('');

    } catch (e) { console.error(e); }
  }

  // --- 関数B：下の「カテゴリー一覧」をバラバラにして重複を消す ---
  async function loadCategoryList() {
    const container = document.getElementById('dynamic-tags'); 
    if (!container) return;
    try {
      const res = await fetch(MY_GAS_URL);
      const allData = await res.json();
      
      // 全記事からタグを集めてバラバラにする
      let rawTags = [];
      allData.forEach(item => {
        if (item.category) {
          const splitTags = item.category.split(',').map(t => t.replace('#', '').trim());
          rawTags = rawTags.concat(splitTags);
        }
      });

      // 重複を消して綺麗にする
      const uniqueTags = [...new Set(rawTags)].filter(t => t !== "");
      
      // ボタンにする
      container.innerHTML = uniqueTags.map(tag => 
        `<a href="list.html?tag=${encodeURIComponent(tag)}" class="tag-item" style="text-decoration:none;">#${tag}</a>`
      ).join('');
    } catch (e) { console.error(e); }
  }

  // 3. 実行順序の整理
  window.addEventListener('load', async () => {
    await loadDiary();
    await loadCategoryList();
    if (typeof renderRecentPosts === 'function') renderRecentPosts();
  });

  // サイドバー新着日記
  function renderRecentPosts() {
    const container = document.getElementById('recent-posts-list');
    if (!container || !window.diaryData) return;
    const recent = window.diaryData.slice(0, 5);
    container.innerHTML = recent.map(item => {
      const isOff = (item.type === "配信外");
      const link = isOff ? "post-off.html" : "post.html";
      return `<li style="list-style: none; margin-bottom: 12px;"><a href="${link}?id=${item.id}" style="text-decoration: none; color: inherit;"><span class="${isOff ? "recent-snow2" : "recent-snow1"}">❄</span> <span style="margin-left: 5px;">${item.title}</span></a></li>`;
    }).join('');
  }

  fetch("partials/sidebar.html").then(r => r.text()).then(d => {
    document.getElementById("sidebar-container").innerHTML = d;
  });
</script>
