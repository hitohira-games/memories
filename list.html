<script>
const container = document.getElementById('snowContainer');
const symbols = ['❄','❅','❆','✦','✧'];
const count = 22;
for (let i = 0; i < count; i++) {
  const el = document.createElement('span');
  el.classList.add('snowflake');
  el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
  el.style.animationDuration = (10 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * 15) + 's';
  el.style.opacity = 0;
  container.appendChild(el);
}
</script>

<script>
    // ★あなたのGASのURL
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

    async function updateList() {
        const params = new URLSearchParams(window.location.search);
        const targetTag = params.get('tag'); 
        
        const listContainer = document.getElementById('diary-list-container');
        const tagFilter = document.getElementById('dynamic-tags'); 
        
        if (!listContainer) return;

        try {
            const response = await fetch(MY_GAS_URL);
            const allData = await response.json();

            // 現在のファイル名を取得（list.html か list-off.html か）
            const currentFile = window.location.pathname.split("/").pop() || 'list.html';

            // 1. ファイル名に合わせて「配信」か「配信外」かを自動判別
            const typeFilter = currentFile === 'list-off.html' ? "配信外" : "配信";
            const diaryData = allData.filter(item => item.type === typeFilter);
            
            diaryData.sort((a, b) => b.id - a.id);

            // 2. タグボタンを自動生成
            if (tagFilter) {
                const categories = [...new Set(diaryData.map(item => item.category))];
                let tagHTML = `<a href="${currentFile}" class="${!targetTag ? 'active' : ''}">すべて</a>`;
                categories.forEach(cat => {
                    const isActive = (targetTag === cat) ? 'active' : '';
                    tagHTML += `<a href="${currentFile}?tag=${encodeURIComponent(cat)}" class="tag-item ${isActive}">${cat}</a>`;
                });
                tagFilter.innerHTML = tagHTML;
            }

            // 3. 記事リストを表示
            listContainer.innerHTML = ''; 
            const filteredByTag = targetTag ? diaryData.filter(item => item.category === targetTag) : diaryData;

            filteredByTag.forEach(item => {
                const card = document.createElement('a');
                // リンク先を配信ルートか配信外ルートかで自動切り替え
                const linkDest = typeFilter === "配信外" ? "post-off.html" : "post.html";
                card.href = `${linkDest}?id=${item.id}`;
                card.className = 'article-card';

                card.innerHTML = `
                    <div class="card-meta" style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <span class="card-date" style="font-size: 0.85rem; color: #888;">${item.date}</span>
                        <span class="tag-item2">${item.category}</span>
                    </div>
                    <h2 class="card-title">${item.title}</h2>
                `;
                listContainer.appendChild(card);
            });

            // 4. 見出しの更新
            const pageTitle = document.querySelector('.list-page-title');
            if (pageTitle) {
                const titleText = typeFilter === "配信外" ? "配信外日記" : "配信日記";
                pageTitle.innerText = targetTag ? `❄ ${targetTag} 一覧 ❄` : `❄ ${titleText} ❄`;
            }

        } catch (error) {
            console.error("データの取得に失敗しました:", error);
            listContainer.innerHTML = '<p>日記を読み込めませんでした。しばらく待ってから再読み込みしてください。</p>';
        }
    }

    window.addEventListener('load', updateList);
    window.addEventListener('popstate', updateList);
</script>
