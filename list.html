<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配信日記一覧 — ❄ ゲームひとひら綴り ❄</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Klee+One:wght@400;600&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/style.css">
<style>
  .card-tags {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag-item {
    font-family: 'Klee One', sans-serif !important;
    font-weight: 600 !important;
    font-size: 0.75rem !important;
    color: #3378c1 !important;
    background: transparent !important;
    border: 1px solid rgba(136, 206, 235, 0.8) !important; 
    padding: 1px 9px !important;
    border-radius: 12px !important;
    display: inline-block !important;
    line-height: 1.4 !important;
    letter-spacing: 0.03em;
    text-decoration: none;
  }
  /* 絞り込みエリアの調整 */
  .tag-filter-section {
    margin-bottom: 30px;
    text-align: center;
  }
  #all-tags-container {
    display: none;
    margin-top: 15px;
    padding: 20px;
    background: rgba(255,255,255,0.2);
    border: 1px dashed rgba(136, 206, 235, 0.5);
    border-radius: 15px;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-snowflakes"></div>
<div class="snow-container" id="snowContainer"></div>

<div id="wrapper">
  <header class="fade-in">
    <div class="site-title-deco">
      <div class="deco-line"></div>
      <span class="snowflake-deco">❄</span>
      <a href="index.html" class="site-title">ゲームひとひら綴り</a>
      <span class="snowflake-deco" style="animation-direction:reverse">❄</span>
      <div class="deco-line"></div>
    </div>
    <p class="site-subtitle">hitohira.pages.dev</p>
  </header>

  <nav class="fade-in fade-in-delay-1">
    <a href="list.html">配信日記</a>
    <a href="list-off.html">配信外日記</a>
    <a href="games.html">今まで遊んだゲーム</a>
    <a href="profile.html">プロフィール</a>
  </nav>

  <div class="main-grid fade-in fade-in-delay-2">
    <main>
      <div class="list-heading">
        <p class="breadcrumb"><a href="index.html">トップ</a><span>›</span>配信日記</p>
        <h1 class="list-page-title" id="page-main-title"><span class="title-snow1">❄</span>配信日記</h1>
        <p class="list-details" id="page-sub-details">リンク先で全文が読めます</p>
      </div>

      <div class="tag-filter-section">
        <button id="tag-toggle-btn" style="background: white; border: 1px solid #88ceeb; color: #3378c1; padding: 6px 20px; border-radius: 20px; cursor: pointer; font-family: 'Shippori Mincho', serif; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
          ❄ タグで絞り込む
        </button>
        <div id="all-tags-container"></div>
      </div>

      <div class="article-list" id="diary-list-container"></div>
    </main>
    <div id="sidebar-container"></div>
  </div>

  <footer class="fade-in">
    <p class="footer-copy">© ゲームひとひら綴り &nbsp;|&nbsp; hitohira.pages.dev</p>
  </footer>
</div>

<script>
  // 雪の演出
  const sc = document.getElementById('snowContainer');
  const symbols = ['❄','❅','❆','✦','✧'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('span');
    el.classList.add('snowflake');
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
    el.style.animationDuration = (10 + Math.random() * 18) + 's';
    el.style.animationDelay = (Math.random() * 15) + 's';
    sc.appendChild(el);
  }

  const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

  async function startPage() {
    try {
      const response = await fetch(MY_GAS_URL);
      const allData = await response.json();
      
      const urlParams = new URLSearchParams(window.location.search);
      const tagFilter = urlParams.get('tag');

      // ★ list-offの場合は "配信外" に書き換えてね
      const typeFilter = "配信"; 
      let myPageData = allData.filter(item => item.type === typeFilter);

      // --- タグ集計処理 ---
      const tagCounts = {};
      myPageData.forEach(item => {
        if (!item.category) return;
        const tags = item.category.split(/[,、\s#]+/).filter(t => t.trim() !== "");
        tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
      });

      const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
      const tagsContainer = document.getElementById('all-tags-container');
      
      // ボタンの生成（リンク先を自分自身のファイル名に合わせる）
      const currentFile = window.location.pathname.split('/').pop() || 'list.html';
      tagsContainer.innerHTML = sortedTags.map(tag => 
        `<a href="${currentFile}?tag=${encodeURIComponent(tag)}" class="tag-item">#${tag}(${tagCounts[tag]})</a>`
      ).join('');

      // 折りたたみスイッチ
      const toggleBtn = document.getElementById('tag-toggle-btn');
      toggleBtn.onclick = () => {
        const isHidden = tagsContainer.style.display === 'none' || tagsContainer.style.display === '';
        tagsContainer.style.display = isHidden ? 'flex' : 'none';
        toggleBtn.innerText = isHidden ? '❄ 閉じる' : '❄ タグで絞り込む';
      };

      // --- 絞り込み実行 ---
      if (tagFilter) {
        // ★ list-offの場合はここも title-snow2 にすると色が合うよ
        document.getElementById('page-main-title').innerHTML = `<span class="title-snow1">❄</span>タグ: ${tagFilter}`;
        document.getElementById('page-sub-details').innerText = `「${tagFilter}」がついた日記一覧です`;

        myPageData = myPageData.filter(item => {
          if (!item.category) return false;
          const tags = item.category.split(/[,、\s#]+/).filter(t => t.trim() !== "");
          return tags.includes(tagFilter);
        });
      }

      myPageData.sort((a, b) => Number(b.id) - Number(a.id));
      renderMyList(myPageData);
    } catch (e) { console.error("エラー:", e); }
  }

  function renderMyList(data) {
    const listContainer = document.getElementById('diary-list-container');
    if (!listContainer) return;
    listContainer.innerHTML = data.length === 0 ? '<p style="text-align:center; opacity:0.6;">記事が見つかりませんでした。</p>' : '';
    
    data.forEach(item => {
      const card = document.createElement('a');
      const targetPage = (item.type === "配信外") ? "post-off.html" : "post.html";
      card.href = `${targetPage}?id=${item.id}`;
      card.className = 'article-card';
      
      const d = new Date(item.date);
      const formattedDate = d.toLocaleDateString('ja-JP', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replaceAll('/', '.');

      const rawCategory = item.category || "";
      const tags = rawCategory.split(/[,、\s#]+/).filter(t => t.trim() !== "");
      const tagHtml = tags.map(t => `<span class="tag-item">#${t}</span>`).join('');

      card.innerHTML = `
        <div class="card-meta"><span class="card-date">${formattedDate}</span></div>
        <h2 class="card-title">${item.title}</h2>
        <div class="card-tags">${tagHtml}</div>
      `;
      listContainer.appendChild(card);
    });
  }

  fetch("partials/sidebar.html").then(r => r.text()).then(d => {
    document.getElementById("sidebar-container").innerHTML = d;
  });

  window.addEventListener('DOMContentLoaded', startPage);
</script>
</body>
</html>
