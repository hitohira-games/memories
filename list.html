<script>
const container = document.getElementById('snowContainer');
const symbols = ['вқ„','вқ…','вқҶ','вңҰ','вң§'];
const count = 22;
for (let i = 0; i < count; i++) {
  const el = document.createElement('span');
  el.classList.add('snowflake');
  el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
  el.style.animationDuration = (10 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * 15) + 's';
  el.style.opacity = 0;
  container.appendChild(el);
}
</script>

<script>
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

    async function startPage() {
        try {
            const response = await fetch(MY_GAS_URL);
            const allData = await response.json();
            window.diaryData = allData; 

            // --- вқ„ гҒ“гҒ“гҒӢгӮүгҖҢгӮҝгӮ°гҖҚгӮ’иӘӯгҒҝеҸ–гӮӢеҮҰзҗҶ вқ„ ---
            const urlParams = new URLSearchParams(window.location.search);
            const targetTag = urlParams.get('tag'); // URLгҒ® ?tag= гҒ®дёӯиә«гӮ’гҒЁгӮӢгӮҲ
            // ------------------------------------------

            const typeFilter = "й…ҚдҝЎ"; 
            let myPageData = allData.filter(item => item.type === typeFilter);

            // --- вқ„ гӮҝгӮ°гҒҢгҒӮгҒЈгҒҹгӮүгҒ•гӮүгҒ«зөһгӮҠиҫјгӮҖпјҒ вқ„ ---
            if (targetTag) {
                myPageData = myPageData.filter(item => item.category === targetTag);
                
                // гғҡгғјгӮёдёҠгҒ®гӮҝгӮӨгғҲгғ«пјҲй…ҚдҝЎеӨ–ж—ҘиЁҳпјүгӮ’гҖҢFF14гҒ®ж—ҘиЁҳгҖҚгҒЁгҒӢгҒ«еӨүгҒҲгӮӢ
                const titleEl = document.querySelector('.list-page-title');
                if (titleEl) {
                    titleEl.innerHTML = `<span class="title-snow1">вқ„</span>${targetTag} гҒ®ж—ҘиЁҳ`;
                }
            }
            // ------------------------------------------

            myPageData.sort((a, b) => b.id - a.id);
            
            // е·ҰеҒҙгҒ®гғӘгӮ№гғҲгӮ’иЎЁзӨә
            renderMyList(myPageData, typeFilter);

            // еҸіеҒҙгҒ®ж–°зқҖж—ҘиЁҳгӮ’еҮәгҒҷ
            let attempts = 0;
            const checkAndRender = setInterval(() => {
                const target = document.getElementById('recent-posts-list');
                if (target) {
                    renderRecentPosts();
                    clearInterval(checkAndRender);
                }
                if (attempts++ > 30) clearInterval(checkAndRender);
            }, 200);

        } catch (e) { console.error("гӮЁгғ©гғј:", e); }
    }

    // гғӘгӮ№гғҲжҸҸз”»з”ЁпјҲгӮігғјгғүгӮ’гӮ№гғғгӮӯгғӘгҒ•гҒӣгӮӢгҒҹгӮҒеҲҶйӣўгҒ—гҒҹгӮҲпјү
   // гғӘгӮ№гғҲжҸҸз”»з”Ё
    function renderMyList(data, type) {
        const listContainer = document.getElementById('diary-list-container');
        if (!listContainer) return;
        listContainer.innerHTML = '';
        
        data.forEach(item => {
            const card = document.createElement('a');
            const linkDest = type === "й…ҚдҝЎеӨ–" ? "post-off.html" : "post.html";
            card.href = `${linkDest}?id=${item.id}`;
            card.className = 'article-card';
            
            // --- вқ„ ж—Ҙд»ҳгӮ’з¶әйә—гҒ«гҒҷгӮӢйӯ”жі• вқ„ ---
            const d = new Date(item.date);
            const formattedDate = d.toLocaleDateString('ja-JP', {
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit'
            }).replaceAll('/', '.'); // 2026.04.11 гҒҝгҒҹгҒ„гҒӘеҪўгҒ«гҒҷгӮӢгӮҲ
            // ---------------------------------

            card.innerHTML = `
                <div class="card-meta"><span class="card-date">${formattedDate}</span></div>
                <h2 class="card-title">${item.title}</h2>
            `;
            listContainer.appendChild(card);
        });
    }

    // гғҡгғјгӮёгҒҢй–ӢгҒ„гҒҹгӮүе®ҹиЎҢпјҒ
    window.addEventListener('DOMContentLoaded', startPage);
</script>
