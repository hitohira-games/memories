<script>
const container = document.getElementById('snowContainer');
const symbols = ['❄','❅','❆','✦','✧'];
const count = 22;
for (let i = 0; i < count; i++) {
  const el = document.createElement('span');
  el.classList.add('snowflake');
  el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
  el.style.animationDuration = (10 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * 15) + 's';
  el.style.opacity = 0;
  container.appendChild(el);
}
</script>

<script>
    const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbzB1DkBAyrV5YZrStVlr8AU4jbf-s0NEzYghrjr-rA51JB_DBh3wMulhbokJNcGIYB-/exec"; 

    async function startPage() {
        try {
            // 1. まずデータを取ってくる
            const response = await fetch(MY_GAS_URL);
            const allData = await response.json();
            window.diaryData = allData; // 新着日記（サイドバー）用のデータ

            // 2. 自分のページのリスト（左側）を作る
            const currentFile = window.location.pathname.split("/").pop() || 'list.html';
            const typeFilter = "配信外";
            
            const myPageData = allData.filter(item => item.type === typeFilter);
            myPageData.sort((a, b) => b.id - a.id);

            // リストの描画（ここは今まで通り）
            renderMyList(myPageData, typeFilter);

            // 3. 【ここが解決の鍵！】サイドバーのHTMLが届くのを「待って」から新着を出す
            // sidebar.html が読み込まれるまで最大5秒間、0.2秒おきにチェックするよ
            let retryCount = 0;
            const checkSidebar = setInterval(() => {
                const sidebarBox = document.getElementById('recent-posts'); // サイドバー内のID
                if (sidebarBox && typeof renderRecentPosts === 'function') {
                    renderRecentPosts(); // ここでやっと新着日記を表示！
                    clearInterval(checkSidebar);
                }
                if (retryCount++ > 25) clearInterval(checkSidebar); // 諦め制限
            }, 200);

        } catch (e) { console.error("エラー:", e); }
    }

    // リスト描画用（コードをスッキリさせるため分離したよ）
    function renderMyList(data, type) {
        const listContainer = document.getElementById('diary-list-container');
        if (!listContainer) return;
        listContainer.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('a');
            const linkDest = type === "配信外" ? "post-off.html" : "post.html";
            card.href = `${linkDest}?id=${item.id}`;
            card.className = 'article-card';
            card.innerHTML = `
                <div class="card-meta"><span class="card-date">${item.date}</span></div>
                <h2 class="card-title">${item.title}</h2>
            `;
            listContainer.appendChild(card);
        });
    }

    window.addEventListener('load', async () => {
    // 1. メイン（配信外）を表示する
    await updateList(); 

    // 2. サイドバーの読み込みを待ってから新着を出す魔法
    // ローカルだとここで止まるけど、サーバー（pages.dev）に上げれば動くよ！
    const checkSidebar = setInterval(() => {
        const sidebarBox = document.getElementById('recent-posts');
        if (sidebarBox && typeof renderRecentPosts === 'function') {
            renderRecentPosts();
            clearInterval(checkSidebar);
        }
    }, 500);
});
</script>
